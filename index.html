<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EL REINO DE JUANFERLAND — ¿Quién ganará la batalla por su control?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container" class="ornate-border">
    <!-- TOP BAR -->
    <div id="top-bar">
      <div id="logo">EL REINO DE <span>JUANFERLAND</span></div>

      <div id="top-controls">
        <select id="ai-level" title="Nivel del Reino Oscuro"></select>
        <button id="btn-new">Nueva Batalla</button>
        <button id="btn-undo" class="secondary">Deshacer</button>
        <button id="btn-export" class="secondary">Exportar</button>
        <button id="btn-import" class="secondary">Importar</button>
      </div>
    </div>

    <!-- MAIN AREA -->
    <div id="main-area">
      <!-- CAPTURES LEFT -->
      <div class="side-panel" id="captures-left">
        <h3>Juanferland</h3>
        <div class="captured-pieces" id="captured-blue"></div>
      </div>

      <!-- BOARD -->
      <div id="board-container">
        <div id="board-wrapper">
          <div id="board"></div>
        </div>
      </div>

      <!-- CAPTURES RIGHT -->
      <div class="side-panel" id="captures-right">
        <h3>El Reino Oscuro</h3>
        <div class="captured-pieces" id="captured-red"></div>
      </div>
    </div>

    <!-- STATUS -->
    <div id="status-bar">
      <div id="status-text">Tu turno</div>
      <div id="turn-indicator">JUANFERLAND</div>
    </div>
  </div>

  <!-- DEBUG PANEL (oculto por defecto) -->
  <div id="debug-panel"></div>

  <!-- Scripts en orden -->
  <script src="config.js"></script>
  <script src="sprites.js"></script>
  <script src="validator.js"></script>
  <script src="engine.js"></script>
  <script src="storage.js"></script>
  <script src="audio.js"></script>
  <script src="ui.js"></script>
  <script src="monitor.js"></script>
  <script src="debug.js"></script>
  <script src="app.js"></script>
</body>
</html>
