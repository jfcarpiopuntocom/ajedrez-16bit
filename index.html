<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#120c08">
<title>El Reino de JuanFerland</title>
<meta property="og:title" content="El Reino de JuanFerland">
<meta property="og:description" content="¿Quién ganará la batalla por su control? Ajedrez 16-bit: juega con un amigo o contra la IA (5 niveles, hasta Bobby Fischer).">
<meta property="og:type" content="website">
<meta property="og:url" content="https://jfcarpiopuntocom.github.io/ajedrez-16bit/">
<meta property="og:image" content="https://jfcarpiopuntocom.github.io/ajedrez-16bit/assets/og.png?v=22">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<style>
:root{
  color-scheme:light only; forced-color-adjust:none;
  --gold:#E8A020; --gold2:#F5C24A;
  --navy:#243b8f; --crimson:#a8112f;
  --bg:#120c08; --panel:#1c140d; --ink:#FFFFFF; --emerald:#28ECAA;
  --g:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{height:100%; margin:0; padding:0; overflow:hidden; background:var(--bg); color:var(--ink) !important; -webkit-text-fill-color:var(--ink)}
body{ font-family:"Trebuchet MS","Segoe UI",system-ui,Arial,sans-serif;
  background:
    radial-gradient(125% 85% at 50% 32%, transparent 56%, rgba(0,0,0,.55) 100%),
    radial-gradient(1100px 620px at 50% -8%, #44301c 0%, #1c130b 55%, #0a0604 100%); }
img{ -webkit-user-drag:none; user-select:none }
h1,h2,h3,p,span,a,strong,button,div{ -webkit-text-fill-color:inherit }

.app{ height:100vh; height:100svh; max-width:1180px; margin:0 auto; padding:5px 6px;
  display:flex; flex-direction:column; gap:4px; overflow:hidden }

/* ---------- START SCREEN ---------- */
.start{ position:fixed; inset:0; z-index:100; background:radial-gradient(1100px 700px at 50% -6%, #3a2a1a 0%, #160f08 60%, #0a0604 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:16px; overflow:auto }
.start.hidden{ display:none }
.start img.banner{ width:100%; max-width:560px; height:auto; max-height:22vh; object-fit:contain }
.start h2{ margin:0; font-size:18px; font-weight:800; text-align:center; color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
.choices{ display:flex; flex-direction:column; gap:12px; width:100%; max-width:360px }
.bigbtn{ font-size:18px; font-weight:800; color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important;
  border:3px solid var(--gold); border-radius:14px; padding:16px; cursor:pointer; min-height:60px; background:linear-gradient(#2c416f,#16223f) }
.bigbtn.ai{ background:linear-gradient(#5a2a14,#3a1a0c) }
.bigbtn:active{ transform:translateY(1px) }
.levels{ display:none; flex-direction:column; gap:8px; width:100%; max-width:360px }
.levels.show{ display:flex }
.levels .lv{ font-size:16px; font-weight:700; color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important;
  border:2px solid var(--gold); border-radius:11px; padding:12px 14px; cursor:pointer; min-height:50px;
  background:linear-gradient(#3a1f12,#26140b); display:flex; justify-content:space-between; align-items:center }
.levels .lv .tag{ font-size:13px; color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
.kingpick{ display:flex; flex-direction:column; gap:7px; align-items:center }
.kingrow{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center }
.kingrow .lbl{ font-size:14px; font-weight:800; min-width:78px; text-align:right;
  color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
.kingrow button{ background:#16223f; border:2px solid var(--gold); border-radius:10px; padding:0; cursor:pointer;
  width:62px; height:62px; display:flex; align-items:center; justify-content:center; overflow:hidden }
.kingrow[data-side="b"] button{ background:#2a0e12 }
.kingrow button.active{ border-color:var(--gold2); box-shadow:0 0 10px var(--gold) }
.kingrow button img{ max-height:54px; max-width:54px; width:auto; height:auto; object-fit:contain; display:block }
.back{ font-size:14px; font-weight:700; color:#CCCCCC !important; -webkit-text-fill-color:#CCCCCC !important; background:transparent; border:none; cursor:pointer; padding:6px }

/* ---------- Title (top, prominent) ---------- */
.title-img{ flex:0 0 auto; display:block; margin:0 auto; width:auto; max-width:100%; max-height:9vh; max-height:9svh; pointer-events:none }

/* ---------- Turn / status ---------- */
.status{ flex:0 0 auto; text-align:center; font-size:15px; font-weight:800; min-height:24px; color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important }
.status .chip{ display:inline-block; padding:3px 13px; border-radius:9px; color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important; font-weight:800 }
.status .chip.azul{ background:var(--navy) }
.status .chip.rojo{ background:var(--crimson) }
.status .warn{ color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
.status .win{ color:var(--emerald) !important; -webkit-text-fill-color:var(--emerald) !important }

/* ---------- Stage ---------- */
.stage{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; align-items:center; gap:5px; width:100% }
.board-area{ flex:1 1 auto; min-height:0; width:100%; display:flex; align-items:center; justify-content:center }
.board-frame{ display:grid; grid-template-columns:var(--g) auto var(--g); grid-template-rows:var(--g) auto var(--g) }
.coord{ display:flex; color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important; font-size:13px; font-weight:800; line-height:1; align-items:center; justify-content:center }
.coord.files{ flex-direction:row } .coord.files span{ flex:1; text-align:center }
.coord.ranks{ flex-direction:column } .coord.ranks span{ flex:1; display:flex; align-items:center; justify-content:center }

.board{ position:relative; width:200px; height:226px; background:url("assets/board.png?v=22") center/100% 100% no-repeat;
  border:3px solid var(--gold); border-radius:3px; box-shadow:0 10px 26px rgba(0,0,0,.55) }
.board .dot{ position:absolute; width:5px; height:5px; margin:-2.5px 0 0 -2.5px; border-radius:50%; background:#C9A24B; box-shadow:0 0 1px rgba(0,0,0,.7); z-index:0; pointer-events:none }
.grid{ position:absolute; inset:0; z-index:1; display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr); touch-action:none }
/* SUBSYSTEM: Grid Containment — no piece escapes its cell */
.cell{ position:relative; cursor:grab; overflow:hidden; contain:layout paint }
/* SUBSYSTEM: Sprite Symmetry — identical positioning for both teams */
.cell img{ position:absolute; left:50%; bottom:0; transform:translateX(-50%);
  width:auto; height:88%; object-fit:contain; display:block;
  max-width:96%; max-height:100%;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.55)); pointer-events:none }
.cell img[data-t="p"]{ height:68%; bottom:9% }
.cell img[data-t="p"][data-c="b"]{ bottom:13% }
.cell img[data-t="r"]{ height:84% }
.cell img[data-t="b"]{ height:92% }
.cell img[data-t="n"]{ height:95% }
.cell img[data-t="q"]{ height:99% }
.cell img[data-t="k"]{ height:100% }
.cell img.flip{ transform:translateX(-50%) scaleX(-1) }
.cell.last{ background:rgba(232,160,32,.20) }
.cell.check::after{ content:""; position:absolute; inset:5%; border:3px solid #ff5252; border-radius:7px; box-shadow:0 0 12px #ff2020 }

/* ---------- History panel (always visible, left of board) ---------- */
.history{ flex:0 0 auto; width:100%; max-width:430px; max-height:80px; overflow-y:auto;
  background:linear-gradient(160deg,#241a10,#140d07); border:2px solid var(--gold); border-radius:8px; padding:4px 8px;
  font-size:12px; line-height:1.4; color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important }
.history h4{ margin:0 0 3px; font-size:11px; font-weight:800; color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important; text-align:center; letter-spacing:.5px }
.history ol{ margin:0; padding-left:22px; columns:2; column-gap:12px } .history li{ margin:0; break-inside:avoid }
.history li span{ display:inline-block; min-width:42px }
.history li span.r{ color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
.drag-ghost{ position:fixed; pointer-events:none; z-index:60; transform:translate(-50%,-58%); will-change:left,top }
.drag-ghost img{ width:auto; filter:drop-shadow(0 10px 9px rgba(0,0,0,.6)) }
.drag-ghost img.flip{ transform:scaleX(-1) }

/* ---------- Captures (fixed height) ---------- */
.cap{ flex:0 0 auto; width:100%; max-width:400px; height:26px; border:2px solid var(--gold); border-radius:8px; padding:1px 7px;
  background:linear-gradient(160deg,#1a2848,#0d1530); display:flex; align-items:center; gap:6px; overflow:hidden }
.cap.red{ background:linear-gradient(160deg,#46161a,#280a0e) }
.cap h3{ margin:0; font-size:11px; font-weight:800; white-space:nowrap; color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
.cap .score{ color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important }
.cap .slots{ flex:1; display:flex; gap:1px; align-items:center; overflow:hidden; height:22px }
.cap .slots img{ height:20px; width:auto }

/* ---------- Buttons (bottom) ---------- */
.hud{ flex:0 0 auto; display:flex; gap:10px; justify-content:center; align-items:center }
.hud button{ font-size:15px; font-weight:800; color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important;
  background:linear-gradient(#5a2a14,#3a1a0c); border:2px solid var(--gold); border-radius:10px; padding:9px 18px; min-height:44px; cursor:pointer }
.hud button.gold{ background:linear-gradient(var(--gold2),var(--gold)); color:#1a1006 !important; -webkit-text-fill-color:#1a1006 !important }
.note{ flex:0 0 auto; text-align:center; font-size:13px; min-height:15px; color:#CCCCCC !important; -webkit-text-fill-color:#CCCCCC !important }
.quote{ flex:0 0 auto; width:100%; max-width:430px; text-align:center; font-style:italic; font-size:13px; line-height:1.35;
  color:#E8D8B0 !important; -webkit-text-fill-color:#E8D8B0 !important; padding:1px 8px; min-height:17px; transition:opacity .35s;
  font-family:"Trebuchet MS","Segoe UI",system-ui,Arial,sans-serif; word-wrap:break-word; overflow-wrap:break-word }
.quote b{ font-style:normal; font-weight:800; color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important; display:block; margin-top:4px }

/* ---------- Desktop / tablet ---------- */
@media (min-width:900px){
  :root{ --g:18px }
  .stage{ flex-direction:row; align-items:flex-start; justify-content:center; gap:12px }
  .cap{ flex:0 0 96px; width:96px; max-width:96px; height:auto; max-height:100%; flex-direction:column; align-items:stretch; padding:6px; align-self:flex-start }
  .cap h3{ white-space:normal; text-align:center; font-size:12px; margin-bottom:5px }
  .cap .slots{ flex-wrap:wrap; align-content:flex-start; height:auto; max-height:62vh }
  .cap .slots img{ height:26px }
  .board-area{ flex:1 1 auto; order:0; align-self:stretch }
  .cap.red{ order:1 } .cap.blue{ order:2 }
  .left-rail{ order:-1; display:flex; flex-direction:column; gap:10px; flex:0 0 210px; width:210px; max-width:210px; align-self:stretch }
  .quote{ flex:0 1 auto; width:100%; max-width:100%; display:block; text-align:center;
    font-size:14px; line-height:1.45; padding:12px; min-height:0; border:2px solid var(--gold); border-radius:12px; background:linear-gradient(160deg,#241a10,#140d07) }
  .history{ flex:1 1 auto; width:100%; max-width:100%; max-height:none }
  .history ol{ columns:1 }
  .title-img{ max-height:12vh }
}
@media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important } }
@media (prefers-color-scheme:dark){
  html,body{ background:var(--bg); color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important }
  .status,.cap .score{ color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important }
  .coord,.cap h3,.start h2,.kingrow .lbl{ color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
  .note{ color:#CCCCCC !important; -webkit-text-fill-color:#CCCCCC !important }
}
</style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div class="start" id="start">
  <img class="banner" src="assets/title.png?v=22" alt="El Reino de JuanFerland">
  <h2 id="startH2">¿Cómo quieres jugar?</h2>
  <div class="choices">
    <button class="bigbtn" id="btn2p">👥 Con un amigo</button>
    <button class="bigbtn ai" id="btnAI">🐉 Contra la IA</button>
  </div>
  <div class="levels" id="levels"></div>
  <div class="kingpick" id="kingpick">
    <div class="kingrow" data-side="w">
      <span class="lbl">Rey Azul:</span>
      <button data-k="k_bkA" class="active"><img src="assets/pieces/k_bkA_hi.png?v=22" alt="Rey azul 1"></button>
      <button data-k="k_bkB"><img src="assets/pieces/k_bkB_hi.png?v=22" alt="Rey azul 2"></button>
      <button data-k="k_bkC"><img src="assets/pieces/k_bkC_hi.png?v=22" alt="Rey azul 3"></button>
    </div>
    <div class="kingrow" data-side="b">
      <span class="lbl">Rey Rojo:</span>
      <button data-k="k_rkA" class="active"><img src="assets/pieces/k_rkA_hi.png?v=22" alt="Rey rojo 1"></button>
      <button data-k="k_rkB"><img src="assets/pieces/k_rkB_hi.png?v=22" alt="Rey rojo 2"></button>
      <button data-k="k_rkC"><img src="assets/pieces/k_rkC_hi.png?v=22" alt="Rey rojo 3"></button>
    </div>
  </div>
  <button class="back" id="backBtn" style="display:none">← volver</button>
</div>

<!-- ===== GAME ===== -->
<div class="app" id="app" style="display:none">
  <img class="title-img" src="assets/title.png?v=22" alt="El Reino de JuanFerland">
  <div class="status" id="status"></div>

  <div class="stage">
    <section class="cap red"><h3>Capturas Rojo <span class="score" id="scoreB"></span></h3><div class="slots" id="capB"></div></section>
    <div class="board-area">
      <div class="board-frame">
        <div></div><div class="coord files" id="filesTop"></div><div></div>
        <div class="coord ranks" id="ranksLeft"></div>
        <div class="board" id="board"><div class="grid" id="grid"></div></div>
        <div class="coord ranks" id="ranksRight"></div>
        <div></div><div class="coord files" id="filesBot"></div><div></div>
      </div>
    </div>
    <section class="cap blue"><h3>Capturas Azul <span class="score" id="scoreW"></span></h3><div class="slots" id="capW"></div></section>
    <div class="left-rail">
      <div class="quote" id="quote"></div>
      <aside class="history" id="history"><h4>Jugadas</h4><ol id="histlist"></ol></aside>
    </div>
  </div>

  <div class="hud">
    <button class="gold" id="newgame">Nueva Partida</button>
    <button id="undo">Deshacer</button>
    <button id="redo">Rehacer</button>
    <button id="rematch" style="display:none">Revancha</button>
    <button id="mutebtn" title="Sonido">🔊</button>
  </div>
  <div class="note" id="note"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chess.js@0.12.1/chess.min.js"></script>
<script>
"use strict";
let blueKing='k_bkA', redKing='k_rkA';
const V='?v=31';
const PIECE=(c,t)=> ((t==='k') ? `assets/pieces/${c==='w'?blueKing:redKing}.png` : `assets/pieces/${c}${t.toUpperCase()}.png`)+V;
const CAPICON=(c,t)=> `assets/pieces/${c}${t.toUpperCase()}_t.png`+V;
const NATIVE_RIGHT=t=>(t==='k'||t==='q');
const VAL={p:1,n:3,b:3,r:5,q:9,k:0};
const LEVELS=[
  {key:'medio',  name:'Medio',         elo:1200, skill:3,  mt:400},
  {key:'alto',   name:'Alto calibre',  elo:1600, skill:8,  mt:600},
  {key:'master', name:'Chess Master',  elo:2100, skill:14, mt:900},
  {key:'gm',     name:'Grandmaster',   elo:2600, skill:20, mt:1300},
  {key:'fischer',name:'Bobby Fischer', elo:null, skill:20, mt:1900},
];
const APHORISMS=[
  {t:'Cuando veas una buena jugada, busca una mejor.', a:'Emanuel Lasker'},
  {t:'El peón es el alma del ajedrez.', a:'A. Philidor'},
  {t:'Una amenaza es más fuerte que su ejecución.', a:'A. Nimzowitsch'},
  {t:'Antes del final, los dioses crearon el medio juego.', a:'S. Tarrasch'},
  {t:'El ajedrez es la lucha contra el error.', a:'J. Zukertort'},
  {t:'Ayuda a tus piezas y ellas te ayudarán.', a:'Paul Morphy'},
  {t:'Toda batalla se gana antes de librarse.', a:'Sun Tzu'},
  {t:'Conoce al rival y conócete: cien victorias.', a:'Sun Tzu'},
  {t:'La oportunidad se multiplica cuando se aprovecha.', a:'Sun Tzu'},
  {t:'La estrategia sin táctica es el camino lento a la victoria.', a:'Sun Tzu'},
  {t:'No gana la pieza más fuerte, sino la mejor situada.', a:'Principio posicional'},
  {t:'Planea como un sabio; ejecuta como una máquina.', a:'R. Spielmann'},
  {t:'El método importa tanto como el cálculo.', a:'M. Botvinnik'},
  {t:'Quien domina el centro, dicta el ritmo.', a:'Principio clásico'},
  {t:'El error espera sentado a quien mueve sin plan.', a:'Proverbio'},
  {t:'Sacrifica lo pequeño para conquistar lo grande.', a:'Estrategia'},
  {t:'La paciencia es una jugada que el rival no ve.', a:'JuanFerland'},
  {t:'Lo más caro es no planear.', a:'JuanFerland'},
  {t:'Quien no arriesga, rara vez conquista el reino.', a:'JuanFerland'},
];
let qi=-1, qTimer=null;
function rotateQuote(){ const el=document.getElementById('quote'); if(!el) return;
  qi=(qi+1)%APHORISMS.length; const q=APHORISMS[qi];
  el.style.opacity='0'; setTimeout(()=>{ el.innerHTML='&ldquo;'+q.t+'&rdquo; <b>&mdash; '+q.a+'</b>'; el.style.opacity='1'; },160); }
function startQuotes(){ if(qTimer) clearInterval(qTimer); qi=-1; rotateQuote(); qTimer=setInterval(rotateQuote,9000); }
const BOARD_W=472, BOARD_H=536, ASPECT=BOARD_W/BOARD_H, FILES='abcdefgh';

let mode='2p', level=LEVELS[1];
let started=false, flipped=false, lastMove=null, busy=false, healing=false;
const game=new Chess(); const capW=[], capB=[];
let muted=false, redoStack=[];

/* ===== Audio (medieval, Web Audio, no files) ===== */
let actx=null;
function actxInit(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function tone(freq,dur,type='sine',vol=0.08,when=0,fc=2400){
  if(muted||!actx) return;
  try{
    const o=actx.createOscillator(), g=actx.createGain(), f=actx.createBiquadFilter();
    o.type=type; o.frequency.value=freq; f.type='lowpass'; f.frequency.value=fc;
    const t=actx.currentTime+when;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(f); f.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
// Physical piece-on-board click: short bandpass-filtered noise burst (wood-like).
function clickNoise(){
  if(muted||!actx) return;
  try{
    const dur=0.040;
    const sr=actx.sampleRate;
    const buf=actx.createBuffer(1, Math.floor(sr*dur), sr);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    const src=actx.createBufferSource(); src.buffer=buf;
    const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=4;
    const g=actx.createGain();
    const t=actx.currentTime;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.18,t+0.003);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(bp); bp.connect(g); g.connect(actx.destination);
    src.start(t); src.stop(t+dur+0.01);
  }catch(e){}
}
const SFX={
  // Physical click (noise burst, not oscillator)
  move:    ()=>{ clickNoise(); },
  // Muted bell: two close tones
  capture: ()=>{ tone(440,0.18,'sine',0.07,0,2000); tone(660,0.14,'sine',0.05,0,2200); },
  // Distant bell warning
  check:   ()=>{ tone(880,0.32,'sine',0.07,0,2400); tone(1320,0.22,'sine',0.04,0.05,2600); },
  // Solemn descending bell sequence
  mate:    ()=>{ [880,659,523,392].forEach((f,i)=>tone(f,0.40,'sine',0.08,i*0.22,2200)); }
};

const $=id=>document.getElementById(id);
const gridEl=$('grid'), boardEl=$('board'), statusEl=$('status'), note=$('note'), boardAreaEl=document.querySelector('.board-area');

/* ===== Start screen ===== */
const levelsEl=$('levels');
LEVELS.forEach(l=>{ const b=document.createElement('button'); b.className='lv'; b.dataset.key=l.key;
  b.innerHTML=`<span>${l.name}</span><span class="tag">${l.elo?('~'+l.elo+' Elo'):'máxima'}</span>`;
  b.onclick=()=>{ level=l; startGame('ai'); }; levelsEl.appendChild(b); });
$('btn2p').onclick=()=>startGame('2p');
$('btnAI').onclick=()=>{ levelsEl.classList.add('show'); $('btn2p').style.display='none'; $('btnAI').style.display='none'; $('startH2').textContent='Elige el nivel del Rojo'; $('backBtn').style.display='block'; };
$('backBtn').onclick=()=>{ levelsEl.classList.remove('show'); $('btn2p').style.display=''; $('btnAI').style.display=''; $('startH2').textContent='¿Cómo quieres jugar?'; $('backBtn').style.display='none'; };
$('kingpick').addEventListener('click',e=>{ const b=e.target.closest('button[data-k]'); if(!b) return;
  const row=b.closest('.kingrow'); if(row.dataset.side==='w') blueKing=b.dataset.k; else redKing=b.dataset.k;
  [...row.querySelectorAll('button[data-k]')].forEach(x=>x.classList.toggle('active',x===b)); });

function startGame(m){
  mode=m; started=true;
  game.reset(); capW.length=0; capB.length=0; lastMove=null; busy=false; flipped=false; redoStack.length=0;
  $('start').classList.add('hidden'); $('app').style.display='flex';
  $('rematch').style.display='none';
  if(mode==='ai') boot();
  render(); status(); startQuotes(); renderHistory();
  requestAnimationFrame(()=>{ fitBoard(); requestAnimationFrame(fitBoard); });
}
function backToStart(){
  started=false; $('app').style.display='none'; $('start').classList.remove('hidden');
  levelsEl.classList.remove('show'); $('btn2p').style.display=''; $('btnAI').style.display=''; $('startH2').textContent='¿Cómo quieres jugar?'; $('backBtn').style.display='none';
}

/* ===== Coordinates ===== */
function labels(){
  const files=flipped?[...'hgfedcba']:[...'abcdefgh'];
  const ranks=flipped?[1,2,3,4,5,6,7,8]:[8,7,6,5,4,3,2,1];
  const fh=files.map(f=>`<span>${f.toUpperCase()}</span>`).join(''), rh=ranks.map(r=>`<span>${r}</span>`).join('');
  $('filesTop').innerHTML=fh; $('filesBot').innerHTML=fh; $('ranksLeft').innerHTML=rh; $('ranksRight').innerHTML=rh;
}

/* ===== Fit board ===== */
function fitBoard(){
  if(!started) return;
  const availW=boardAreaEl.clientWidth, availH=boardAreaEl.clientHeight-4;
  const gutter=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--g'))||14;
  let bw=Math.min(availW-2*gutter, (availH-2*gutter)*ASPECT);
  bw=Math.max(170, Math.floor(bw||170));
  boardEl.style.width=bw+'px'; boardEl.style.height=Math.round(bw/ASPECT)+'px';
  ensureNoScroll();
}
function ensureNoScroll(){
  let guard=0;
  while(document.documentElement.scrollHeight>document.documentElement.clientHeight+1 && guard<8){
    const bw=parseFloat(boardEl.style.width)||0; if(bw<=170) break;
    const nw=Math.floor(bw*0.94); boardEl.style.width=nw+'px'; boardEl.style.height=Math.round(nw/ASPECT)+'px'; guard++;
  }
}

/* ===== Render ===== */
function needFlip(color,type){ const bottom=(color==='w')!==flipped; return bottom!==NATIVE_RIGHT(type); }
function sqAt(r,c){ const f=flipped?7-c:c, rk=flipped?r+1:8-r; return FILES[f]+rk; }
function render(){
  labels(); gridEl.innerHTML='';
  const board=game.board();
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const sq=sqAt(r,c); const cell=document.createElement('div'); cell.className='cell'; cell.dataset.sq=sq;
    const f=FILES.indexOf(sq[0]), rk=parseInt(sq[1]); const p=board[8-rk][f];
    if(p){ const img=document.createElement('img'); img.src=PIECE(p.color,p.type); img.alt=p.color+p.type;
      img.dataset.t=p.type; img.dataset.c=p.color;
      if(needFlip(p.color,p.type)) img.classList.add('flip'); cell.appendChild(img); }
    if(lastMove&&(sq===lastMove.from||sq===lastMove.to)) cell.classList.add('last');
    if(p&&p.type==='k'&&p.color===game.turn()&&game.in_check()) cell.classList.add('check');
    gridEl.appendChild(cell);
  }
  renderCaptured(); audit();
}
function renderCaptured(){
  try{
    const w=$('capW'), b=$('capB'); w.innerHTML=''; b.innerHTML='';
    const add=(host,arr)=>arr.forEach(pc=>{ const i=document.createElement('img'); i.src=CAPICON(pc.color,pc.type); i.alt=pc.type; host.appendChild(i); });
    add(w,capW); add(b,capB);
    const sw=capW.reduce((a,p)=>a+VAL[p.type],0), sb=capB.reduce((a,p)=>a+VAL[p.type],0), d=sw-sb;
    $('scoreW').textContent=d>0?`+${d}`:''; $('scoreB').textContent=d<0?`+${-d}`:'';
  }catch(e){ console.warn('[cap]',e); }
}
function audit(){
  try{ if(gridEl.children.length!==64) return heal('cells');
    let n=0; game.board().forEach(row=>row.forEach(c=>{ if(c) n++; }));
    if(gridEl.querySelectorAll('.cell>img').length!==n) return heal('count');
  }catch(e){}
}
function heal(why){ if(healing) return; healing=true; try{ render(); } finally{ healing=false; } }

/* ===== Pure drag ===== */
function canDrag(color){ if(busy||game.game_over()) return false; if(color!==game.turn()) return false; return mode==='2p'?true:color==='w'; }
let drag=null;
function killGhost(){ document.querySelectorAll('.drag-ghost').forEach(g=>g.remove()); }
function cleanupDrag(){ killGhost(); gridEl.querySelectorAll('img[style*="hidden"]').forEach(i=>i.style.visibility=''); drag=null; }
gridEl.addEventListener('pointerdown',e=>{
  try{ const cell=e.target.closest('.cell'); if(!cell) return; const sq=cell.dataset.sq, p=game.get(sq);
    if(!p||!canDrag(p.color)) return; e.preventDefault();
    drag={from:sq,moved:false,sx:e.clientX,sy:e.clientY}; try{gridEl.setPointerCapture(e.pointerId);}catch(_){}
  }catch(err){ console.warn(err); cleanupDrag(); }
});
gridEl.addEventListener('pointermove',e=>{
  if(!drag) return;
  try{
    if(!drag.moved){
      if(Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy)<5) return;
      drag.moved=true; const p=game.get(drag.from); if(!p){ cleanupDrag(); return; }
      const rect=gridEl.querySelector('.cell').getBoundingClientRect();
      const g=document.createElement('div'); g.className='drag-ghost';
      const img=document.createElement('img'); img.src=PIECE(p.color,p.type); img.style.height=Math.round(rect.height*1.05)+'px';
      if(needFlip(p.color,p.type)) img.classList.add('flip');
      g.appendChild(img); document.body.appendChild(g); drag.ghost=g;
      const oi=gridEl.querySelector(`.cell[data-sq="${drag.from}"] img`); if(oi) oi.style.visibility='hidden';
    }
    drag.ghost.style.left=e.clientX+'px'; drag.ghost.style.top=e.clientY+'px';
  }catch(err){ console.warn(err); cleanupDrag(); }
});
function endDrag(e,cancel){
  if(!drag){ killGhost(); return; }
  const moved=drag.moved, from=drag.from; cleanupDrag();
  if(cancel||!moved){ if(moved) render(); return; }
  try{ const el=document.elementFromPoint(e.clientX,e.clientY), cell=el&&el.closest?el.closest('.cell'):null;
    const to=cell?cell.dataset.sq:null;
    if(to&&to!==from) tryMove(from,to); else render();
  }catch(err){ console.warn(err); render(); }
}
gridEl.addEventListener('pointerup',e=>endDrag(e,false));
gridEl.addEventListener('pointercancel',e=>endDrag(e,true));
window.addEventListener('pointerup',e=>{ if(drag) endDrag(e,false); });
window.addEventListener('blur',()=>cleanupDrag());

function tryMove(from,to){
  const ms=game.moves({square:from,verbose:true}).filter(m=>m.to===to);
  if(!ms.length){ render(); return; }
  if(ms.some(m=>m.promotion)){ doMove({from,to,promotion:'q'}); return; }
  doMove({from,to});
}
function doMove(mv){
  const res=game.move({from:mv.from,to:mv.to,promotion:mv.promotion||undefined});
  if(!res){ render(); return; }
  if(res.captured) (res.color==='w'?capW:capB).push({color:res.color==='w'?'b':'w',type:res.captured});
  lastMove={from:res.from,to:res.to}; redoStack.length=0;
  actxInit();
  if(game.in_checkmate()) SFX.mate();
  else if(game.in_check()) SFX.check();
  else if(res.captured) SFX.capture();
  else SFX.move();
  render(); status(); renderHistory(); maybeShowRematch();
  if(mode==='ai' && !game.game_over() && game.turn()==='b') setTimeout(aiMove,200);
}

/* ===== Status ===== */
function status(){
  let s='';
  if(game.in_checkmate()) s=game.turn()==='w'?'<span class="warn">¡Jaque mate! Vence el Rojo. 🐉</span>':'<span class="win">¡Jaque mate! Vence el Azul. 🦁</span>';
  else if(game.in_stalemate()) s='Tablas por ahogado.';
  else if(game.in_threefold_repetition()) s='Tablas por repetición.';
  else if(game.insufficient_material()) s='Tablas: material insuficiente.';
  else if(game.in_draw()) s='Tablas (50 movimientos).';
  else if(game.in_check()) s='<span class="warn">¡Jaque!</span>';
  else if(mode==='2p') s=(game.turn()==='w'?'<span class="chip azul">Turno Azul</span>':'<span class="chip rojo">Turno Rojo</span>');
  else s=(game.turn()==='w'?'<span class="chip azul">Tu turno</span>':'<span class="chip rojo">Piensa el Rojo…</span>');
  statusEl.innerHTML=s;
}

/* ===== Stockfish ===== */
let engine=null, ready=false, fallback=false;
const SF='https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js';
async function boot(){
  if(engine||fallback){ configEngine(); return; }
  try{ const r=await fetch(SF); if(!r.ok) throw new Error('http '+r.status);
    const code=await r.text();
    engine=new Worker(URL.createObjectURL(new Blob([code],{type:'application/javascript'})));
    engine.onmessage=onMsg; engine.onerror=()=>toFallback('worker');
    engine.postMessage('uci'); engine.postMessage('isready');
    setTimeout(()=>{ if(!ready) toFallback('timeout'); },6500);
  }catch(e){ toFallback(e.message); }
}
function toFallback(w){ if(fallback) return; fallback=true; ready=true; note.textContent='IA local ('+w+')'; }
function onMsg(e){ const l=typeof e.data==='string'?e.data:'';
  if((l.includes('uciok')||l.includes('readyok'))&&!ready){ ready=true; configEngine(); note.textContent='Stockfish · '+level.name; }
  if(l.startsWith('bestmove')){ const mv=l.split(' ')[1]; if(mv&&mv!=='(none)') engMove(mv); else { busy=false; status(); } }
}
function configEngine(){ note.textContent=(fallback?'IA local · ':'Stockfish · ')+level.name;
  if(!engine||fallback) return;
  if(level.elo){ engine.postMessage('setoption name UCI_LimitStrength value true'); engine.postMessage('setoption name UCI_Elo value '+level.elo); }
  else engine.postMessage('setoption name UCI_LimitStrength value false');
  engine.postMessage('setoption name Skill Level value '+level.skill);
}
function aiMove(){ if(game.game_over()) return; busy=true; status();
  if(fallback||!engine){ setTimeout(fbMove,260); return; }
  engine.postMessage('position fen '+game.fen()); engine.postMessage('go movetime '+level.mt);
}
function engMove(uci){ const from=uci.slice(0,2), to=uci.slice(2,4), promo=uci.length>4?uci[4]:undefined;
  const res=game.move({from,to,promotion:promo}); busy=false;
  if(!res){ render(); status(); return; }
  if(res.captured) capB.push({color:'w',type:res.captured});
  lastMove={from:res.from,to:res.to};
  actxInit();
  if(game.in_checkmate()) SFX.mate();
  else if(game.in_check()) SFX.check();
  else if(res.captured) SFX.capture();
  else SFX.move();
  render(); status(); renderHistory(); maybeShowRematch();
}
function fbMove(){ const ms=game.moves({verbose:true}); if(!ms.length){ busy=false; return; }
  ms.sort((a,b)=>(b.captured?VAL[b.captured]:0)-(a.captured?VAL[a.captured]:0));
  const top=ms[0].captured?VAL[ms[0].captured]:0, pool=ms.filter(m=>(m.captured?VAL[m.captured]:0)===top);
  const m=pool[Math.floor(Math.random()*pool.length)]; engMove(m.from+m.to+(m.promotion||'')); }

/* ===== Controls ===== */
$('newgame').onclick=()=>backToStart();
function rebuildCaptures(){ capW.length=0; capB.length=0;
  game.history({verbose:true}).forEach(m=>{ if(m.captured) (m.color==='w'?capW:capB).push({color:m.color==='w'?'b':'w',type:m.captured}); });
  const h=game.history({verbose:true}); lastMove=h.length?{from:h[h.length-1].from,to:h[h.length-1].to}:null;
}
$('undo').onclick=()=>{ if(busy) return;
  const u1=game.undo(); if(u1) redoStack.push(u1);
  if(mode==='ai'){ const u2=game.undo(); if(u2) redoStack.push(u2); }
  rebuildCaptures(); render(); status(); renderHistory(); maybeShowRematch(); };
$('redo').onclick=()=>{ if(busy||!redoStack.length) return;
  const steps=mode==='ai'?2:1;
  for(let i=0;i<steps && redoStack.length;i++){
    const mv=redoStack.pop();
    game.move({from:mv.from,to:mv.to,promotion:mv.promotion});
  }
  rebuildCaptures(); render(); status(); renderHistory(); maybeShowRematch(); };
$('rematch').onclick=()=>{ game.reset(); capW.length=0; capB.length=0; lastMove=null; busy=false; redoStack.length=0;
  $('rematch').style.display='none'; render(); status(); renderHistory();
  if(mode==='ai') boot(); };
$('mutebtn').onclick=()=>{ muted=!muted; $('mutebtn').textContent=muted?'🔇':'🔊'; actxInit(); };

function renderHistory(){
  const h=game.history(); const ol=$('histlist'); ol.innerHTML='';
  for(let i=0;i<h.length;i+=2){
    const li=document.createElement('li');
    const w=h[i]||''; const b=h[i+1]||'';
    li.innerHTML=`<span>${w}</span><span class="r">${b}</span>`;
    ol.appendChild(li);
  }
  ol.parentElement.scrollTop=ol.parentElement.scrollHeight;
}
function maybeShowRematch(){ $('rematch').style.display=game.game_over()?'':'none'; }

let rt; window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(fitBoard,90); });
window.addEventListener('orientationchange',()=>setTimeout(fitBoard,200));
</script>
