<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#120c08">
<title>El Reino de JuanFerland</title>
<meta property="og:title" content="El Reino de JuanFerland">
<meta property="og:description" content="¿Quién ganará la batalla por su control? Ajedrez 16-bit contra 5 niveles, hasta el simulador Bobby Fischer.">
<style>
:root{
  color-scheme: light only; forced-color-adjust:none;
  --gold:#E8A020; --gold2:#F5C24A;
  --blue:#1E40AF; --blue-d:#16213d;
  --red:#9F1239; --red-d:#3d0f12;
  --bg:#120c08; --panel:#1c140d; --ink:#FFFFFF;
  --emerald:#28ECAA;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0; background:var(--bg); color:var(--ink) !important; -webkit-text-fill-color:var(--ink)}
body{
  font-family:"Trebuchet MS","Segoe UI",system-ui,Arial,sans-serif;
  min-height:100vh; min-height:100svh;
  background:
    radial-gradient(1100px 620px at 50% -8%, #3a2a1a 0%, #1c130b 56%, #0c0805 100%);
  display:flex; flex-direction:column; align-items:center;
  padding:10px 8px 46px;
}
h1,h2,h3,p,span,a,strong,button,select,label,div{ -webkit-text-fill-color:inherit }
img{ -webkit-user-drag:none; user-select:none }

.shell{ width:100%; max-width:1180px; display:flex; flex-direction:column; align-items:center }

/* ---------- Controls ---------- */
.bar{ width:100%; max-width:620px; display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:10px }
.bar .lbl{ color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important; font-size:14px; font-weight:800; letter-spacing:.6px }
.levels{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center }
.levels button{
  font-size:13px; font-weight:700; color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important;
  background:linear-gradient(#2c416f,#16223f);
  border:2px solid var(--gold); border-radius:9px; padding:8px 11px; cursor:pointer; min-height:42px;
}
.levels button.active{ background:linear-gradient(var(--gold2),var(--gold)); color:#1a1006 !important; -webkit-text-fill-color:#1a1006 !important; box-shadow:0 0 11px var(--gold) }
.row{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; align-items:center }
.row button{
  font-size:14px; font-weight:700; color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important;
  background:linear-gradient(#5a2a14,#3a1a0c); border:2px solid var(--gold); border-radius:9px; padding:9px 15px; cursor:pointer; min-height:44px;
}
.row button.gold{ background:linear-gradient(var(--gold2),var(--gold)); color:#1a1006 !important; -webkit-text-fill-color:#1a1006 !important }
.kingpick{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center }
.kingpick .lbl{ font-size:14px }
.kingpick button{ background:linear-gradient(#2c416f,#16223f); border:2px solid var(--gold); border-radius:10px; padding:4px 6px; cursor:pointer; min-height:58px }
.kingpick button.active{ border-color:var(--gold2); box-shadow:0 0 11px var(--gold); background:linear-gradient(#3c558a,#22335c) }
.kingpick button img{ height:48px; width:auto; display:block }

.status{ width:100%; max-width:620px; text-align:center; font-size:16px; font-weight:800; min-height:24px; margin:2px 0 10px;
  color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important }
.status .warn{ color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
.status .win{ color:var(--emerald) !important; -webkit-text-fill-color:var(--emerald) !important }

/* ---------- Arena (board + side trophies) ---------- */
.arena{ width:100%; display:grid; grid-template-columns:1fr; gap:14px; justify-items:center; align-items:start }
.center{ width:100%; max-width:620px; display:flex; flex-direction:column; align-items:center }

.title-img{ display:block; width:100%; max-width:620px; height:auto; margin:0 auto -3px; pointer-events:none }
.board-shell{ width:100%; max-width:620px; position:relative }
.board{ position:relative; width:100%; aspect-ratio:547/605;
  background:url("assets/board.png") center/100% 100% no-repeat;
  filter:drop-shadow(0 10px 26px rgba(0,0,0,.55)); }
.grid{ position:absolute; left:6.764%; top:5.289%; width:86.289%; height:88.595%;
  display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr); touch-action:none; }
.cell{ position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer }
.cell img{ width:auto; height:auto; max-height:94%; max-width:98%; object-fit:contain;
  filter:drop-shadow(0 3px 3px rgba(0,0,0,.5)); pointer-events:none }
.cell.sel::after{ content:""; position:absolute; inset:5%; border:3px solid var(--gold2); border-radius:7px; box-shadow:0 0 10px var(--gold) }
.cell.move::before{ content:""; position:absolute; width:32%; height:32%; border-radius:50%; background:var(--emerald); box-shadow:0 0 7px var(--emerald) }
.cell.cap::before{ content:""; position:absolute; inset:7%; border:4px solid var(--emerald); border-radius:9px }
.cell.last{ background:rgba(232,160,32,.22) }
.cell.check::after{ content:""; position:absolute; inset:4%; border:3px solid #ff5252; border-radius:8px; box-shadow:0 0 13px #ff2020 }
.cell.drop{ background:rgba(40,236,170,.18) }

.drag-ghost{ position:fixed; pointer-events:none; z-index:60; transform:translate(-50%,-56%); will-change:left,top }
.drag-ghost img{ width:auto; filter:drop-shadow(0 10px 9px rgba(0,0,0,.6)) }

/* ---------- Trophy panels ---------- */
.side{ width:100%; max-width:620px }
.tray{ border:3px solid var(--gold); border-radius:13px; padding:9px 11px; background:linear-gradient(160deg,#1a2848,#0d1530) }
.tray.red{ background:linear-gradient(160deg,#4a1620,#280a0e) }
.tray h3{ margin:0 0 7px; font-size:14px; font-weight:800; letter-spacing:.6px; text-align:center;
  color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
.tray .slots{ display:flex; flex-wrap:wrap; gap:4px; min-height:50px; align-items:center; justify-content:center }
.slot{ width:34px; height:46px; display:flex; align-items:center; justify-content:center }
.slot img{ max-height:44px; max-width:32px; width:auto }
.score{ color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important; font-weight:800 }

/* ---------- Promotion ---------- */
.modal{ position:fixed; inset:0; background:rgba(0,0,0,.74); display:none; align-items:center; justify-content:center; z-index:80 }
.modal.on{ display:flex }
.modal .box{ background:var(--panel); border:3px solid var(--gold); border-radius:15px; padding:16px 18px }
.modal h3{ margin:0 0 12px; text-align:center; font-size:16px; color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
.modal .opts{ display:flex; gap:12px }
.modal .opts button{ background:rgba(255,255,255,.05); border:2px solid transparent; border-radius:10px; padding:4px; cursor:pointer }
.modal .opts button:hover{ border-color:var(--gold2) }
.modal .opts img{ height:78px; width:auto; display:block }

.note{ font-size:13px; color:#CCCCCC !important; -webkit-text-fill-color:#CCCCCC !important; text-align:center; margin-top:18px; max-width:560px }

/* ---------- Desktop / tablet: trophies flank the board ---------- */
@media (min-width:900px){
  .arena{ grid-template-columns:1fr minmax(440px,600px) 1fr; gap:20px; align-items:center }
  .center{ grid-column:2 }
  .side{ max-width:260px }
  .side.red{ grid-column:1; justify-self:end }
  .side.blue{ grid-column:3; justify-self:start }
  .tray .slots{ min-height:120px }
  .slot{ width:42px; height:56px }
  .slot img{ max-height:54px; max-width:40px }
  .board{ filter:drop-shadow(0 14px 34px rgba(0,0,0,.6)) }
}
@media (min-width:1100px){
  .arena{ grid-template-columns:1fr 640px 1fr }
}
@media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important } }
@media (prefers-color-scheme:dark){
  html,body{ background:var(--bg); color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important }
  .status,.score{ color:#FFFFFF !important; -webkit-text-fill-color:#FFFFFF !important }
  .lbl,.tray h3,.modal h3{ color:var(--gold2) !important; -webkit-text-fill-color:var(--gold2) !important }
  .note{ color:#CCCCCC !important; -webkit-text-fill-color:#CCCCCC !important }
}
</style>
</head>
<body>
<div class="shell">

  <div class="bar">
    <div class="lbl">Elige tu rival</div>
    <div class="levels" id="levels"></div>
    <div class="row">
      <button class="gold" id="newgame">Nueva batalla</button>
      <button id="undo">Deshacer</button>
      <button id="flip">Girar</button>
    </div>
    <div class="kingpick" id="kingpick">
      <span class="lbl">Tu Rey:</span>
      <button data-k="wK" class="active" title="Rey del Norte"><img src="assets/pieces/wK.png" alt="Rey A"></button>
      <button data-k="wK2" title="Rey de Hierro"><img src="assets/pieces/wK2.png" alt="Rey B"></button>
    </div>
  </div>

  <div class="status" id="status">Juegas con el ejército Azul. Mueves primero — arrastra una pieza.</div>

  <div class="arena">
    <aside class="side red">
      <div class="tray red">
        <h3>Trofeos del Rojo <span class="score" id="scoreB"></span></h3>
        <div class="slots" id="capB"></div>
      </div>
    </aside>

    <main class="center">
      <img class="title-img" src="assets/title.png" alt="El Reino de JuanFerland">
      <div class="board-shell">
        <div class="board" id="board"><div class="grid" id="grid"></div></div>
      </div>
    </main>

    <aside class="side blue">
      <div class="tray">
        <h3>Trofeos del Azul <span class="score" id="scoreW"></span></h3>
        <div class="slots" id="capW"></div>
      </div>
    </aside>
  </div>

  <div class="note" id="note">Cargando motor de ajedrez…</div>
</div>

<div class="modal" id="promo">
  <div class="box"><h3>Corona tu peón</h3><div class="opts" id="promoOpts"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chess.js@0.12.1/chess.min.js"></script>
<script>
let blueKing='wK';
const PIECE=(c,t)=> (c==='w'&&t==='k') ? `assets/pieces/${blueKing}.png` : `assets/pieces/${c}${t.toUpperCase()}.png`;
const VAL={p:1,n:3,b:3,r:5,q:9,k:0};
const LEVELS=[
  {key:'medio',  name:'Medio',         elo:1200, skill:3,  mt:400},
  {key:'alto',   name:'Alto calibre',  elo:1600, skill:8,  mt:600},
  {key:'master', name:'Chess Master',  elo:2100, skill:14, mt:900},
  {key:'gm',     name:'Grandmaster',   elo:2600, skill:20, mt:1300},
  {key:'fischer',name:'Bobby Fischer', elo:null, skill:20, mt:1900},
];
let level=LEVELS[1];

const game=new Chess();
let flipped=false, selected=null, legalForSel=[], lastMove=null, busy=false;
const capW=[], capB=[];
const FILES='abcdefgh';
const gridEl=document.getElementById('grid');
const statusEl=document.getElementById('status');
const note=document.getElementById('note');

/* Levels UI */
const levelsEl=document.getElementById('levels');
LEVELS.forEach(l=>{
  const b=document.createElement('button'); b.textContent=l.name; b.dataset.key=l.key;
  if(l.key===level.key) b.classList.add('active');
  b.onclick=()=>{ level=l; [...levelsEl.children].forEach(x=>x.classList.toggle('active',x.dataset.key===l.key)); configEngine(); };
  levelsEl.appendChild(b);
});

/* Board */
function sqAt(r,c){ const f=flipped?7-c:c, rk=flipped?r+1:8-r; return FILES[f]+rk; }
function render(){
  gridEl.innerHTML='';
  const board=game.board();
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const sq=sqAt(r,c);
    const cell=document.createElement('div'); cell.className='cell'; cell.dataset.sq=sq;
    const f=FILES.indexOf(sq[0]), rk=parseInt(sq[1]); const p=board[8-rk][f];
    if(p){ const img=document.createElement('img'); img.src=PIECE(p.color,p.type); img.alt=p.color+p.type; cell.appendChild(img); }
    if(lastMove&&(sq===lastMove.from||sq===lastMove.to)) cell.classList.add('last');
    if(selected===sq) cell.classList.add('sel');
    if(legalForSel.includes(sq)) cell.classList.add(game.get(sq)?'cap':'move');
    if(p&&p.type==='k'&&p.color===game.turn()&&game.in_check()) cell.classList.add('check');
    gridEl.appendChild(cell);
  }
  renderCaptured();
}
function renderCaptured(){
  const w=document.getElementById('capW'), b=document.getElementById('capB');
  w.innerHTML=''; b.innerHTML='';
  const add=(host,arr)=>arr.forEach(pc=>{ const s=document.createElement('div'); s.className='slot';
    const i=document.createElement('img'); i.src=PIECE(pc.color,pc.type); s.appendChild(i); host.appendChild(s); });
  add(w,capW); add(b,capB);
  const sw=capW.reduce((a,p)=>a+VAL[p.type],0), sb=capB.reduce((a,p)=>a+VAL[p.type],0), d=sw-sb;
  document.getElementById('scoreW').textContent=d>0?`+${d}`:''; document.getElementById('scoreB').textContent=d<0?`+${-d}`:'';
}

/* Interaction: drag + tap */
function selectSquare(sq){ selected=sq; legalForSel=game.moves({square:sq,verbose:true}).map(m=>m.to); render(); }
function clearSelect(){ selected=null; legalForSel=[]; render(); }
function userMove(from,to){
  const ms=game.moves({square:from,verbose:true}).filter(m=>m.to===to);
  if(!ms.length) return;
  if(ms.some(m=>m.promotion)){ askPromotion(from,to); return; }
  applyMove({from,to});
}
function applyMove(mv){
  const res=game.move({from:mv.from,to:mv.to,promotion:mv.promotion||undefined});
  if(!res) return;
  if(res.captured) capW.push({color:'b',type:res.captured});
  lastMove={from:res.from,to:res.to}; selected=null; legalForSel=[];
  render(); status(); if(!game.game_over()) setTimeout(aiMove,220);
}

let drag=null;
gridEl.addEventListener('pointerdown',e=>{
  if(busy||game.game_over()||game.turn()!=='w') return;
  const cell=e.target.closest('.cell'); if(!cell) return;
  const sq=cell.dataset.sq, p=game.get(sq);
  if(p&&p.color==='w'){
    e.preventDefault(); selectSquare(sq);
    drag={from:sq,moved:false,ghost:null,sx:e.clientX,sy:e.clientY};
    try{gridEl.setPointerCapture(e.pointerId);}catch(_){}
  }else if(selected&&legalForSel.includes(sq)){ userMove(selected,sq); }
  else clearSelect();
});
gridEl.addEventListener('pointermove',e=>{
  if(!drag) return;
  if(!drag.moved){
    if(Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy)<6) return;
    drag.moved=true;
    const p=game.get(drag.from), rect=gridEl.querySelector('.cell').getBoundingClientRect();
    const g=document.createElement('div'); g.className='drag-ghost';
    const img=document.createElement('img'); img.src=PIECE(p.color,p.type); img.style.height=Math.round(rect.height*0.98)+'px';
    g.appendChild(img); document.body.appendChild(g); drag.ghost=g;
    const oi=gridEl.querySelector(`.cell[data-sq="${drag.from}"] img`); if(oi) oi.style.visibility='hidden';
  }
  drag.ghost.style.left=e.clientX+'px'; drag.ghost.style.top=e.clientY+'px';
  const el=document.elementFromPoint(e.clientX,e.clientY), cell=el&&el.closest?el.closest('.cell'):null;
  gridEl.querySelectorAll('.cell.drop').forEach(c=>c.classList.remove('drop'));
  if(cell&&legalForSel.includes(cell.dataset.sq)) cell.classList.add('drop');
});
function endDrag(e,cancel){
  if(!drag) return;
  const moved=drag.moved, from=drag.from;
  if(drag.ghost) drag.ghost.remove();
  const oi=gridEl.querySelector(`.cell[data-sq="${from}"] img`); if(oi) oi.style.visibility='';
  gridEl.querySelectorAll('.cell.drop').forEach(c=>c.classList.remove('drop'));
  drag=null;
  if(cancel||!moved) return;
  const el=document.elementFromPoint(e.clientX,e.clientY), cell=el&&el.closest?el.closest('.cell'):null;
  const to=cell?cell.dataset.sq:null;
  if(to&&to!==from&&legalForSel.includes(to)) userMove(from,to);
}
gridEl.addEventListener('pointerup',e=>endDrag(e,false));
gridEl.addEventListener('pointercancel',e=>endDrag(e,true));

document.getElementById('kingpick').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  blueKing=b.dataset.k;
  [...b.parentElement.querySelectorAll('button')].forEach(x=>x.classList.toggle('active',x===b));
  render();
});

/* Promotion */
function askPromotion(from,to){
  const m=document.getElementById('promo'), opts=document.getElementById('promoOpts'); opts.innerHTML='';
  ['q','r','b','n'].forEach(t=>{ const btn=document.createElement('button');
    const i=document.createElement('img'); i.src=PIECE('w',t); btn.appendChild(i);
    btn.onclick=()=>{ m.classList.remove('on'); applyMove({from,to,promotion:t}); }; opts.appendChild(btn); });
  m.classList.add('on');
}

/* Status */
function status(){
  let s='';
  if(game.in_checkmate()) s=game.turn()==='w'?'<span class="warn">¡Jaque mate! Vence el Rojo. 🐉</span>':'<span class="win">¡Jaque mate! Conquistas el reino, Azul. 🦁</span>';
  else if(game.in_stalemate()) s='Tablas por ahogado.';
  else if(game.in_threefold_repetition()) s='Tablas por repetición.';
  else if(game.insufficient_material()) s='Tablas por material insuficiente.';
  else if(game.in_draw()) s='Tablas (regla de 50 movimientos).';
  else if(game.in_check()) s=game.turn()==='w'?'<span class="warn">¡Jaque a tu Rey!</span>':'<span class="warn">Jaque al Rojo.</span>';
  else s=game.turn()==='w'?'Tu turno (Azul) — arrastra una pieza.':'Piensa el Rojo…';
  statusEl.innerHTML=s;
}

/* Stockfish */
let engine=null, ready=false, fallback=false;
const SF='https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js';
async function boot(){
  try{
    const r=await fetch(SF); if(!r.ok) throw new Error('http '+r.status);
    const code=await r.text();
    engine=new Worker(URL.createObjectURL(new Blob([code],{type:'application/javascript'})));
    engine.onmessage=onMsg; engine.postMessage('uci'); engine.postMessage('isready');
    setTimeout(()=>{ if(!ready) toFallback('timeout'); },6500);
  }catch(e){ toFallback(e.message); }
}
function toFallback(why){ if(fallback) return; fallback=true; ready=true; note.textContent='Motor offline ('+why+'). IA local activa.'; }
function onMsg(e){
  const l=typeof e.data==='string'?e.data:'';
  if((l.includes('uciok')||l.includes('readyok'))&&!ready){ ready=true; configEngine(); note.textContent='Stockfish listo · Rival: '+level.name; }
  if(l.startsWith('bestmove')){ const mv=l.split(' ')[1]; if(mv&&mv!=='(none)') engMove(mv); }
}
function configEngine(){
  note.textContent=(fallback?'IA local · ':'Stockfish · ')+'Rival: '+level.name;
  if(!engine||fallback) return;
  if(level.elo){ engine.postMessage('setoption name UCI_LimitStrength value true'); engine.postMessage('setoption name UCI_Elo value '+level.elo); }
  else engine.postMessage('setoption name UCI_LimitStrength value false');
  engine.postMessage('setoption name Skill Level value '+level.skill);
}
function aiMove(){
  if(game.game_over()) return; busy=true; status();
  if(fallback||!engine){ setTimeout(fbMove,300); return; }
  engine.postMessage('position fen '+game.fen()); engine.postMessage('go movetime '+level.mt);
}
function engMove(uci){
  const from=uci.slice(0,2), to=uci.slice(2,4), promo=uci.length>4?uci[4]:undefined;
  const res=game.move({from,to,promotion:promo}); busy=false;
  if(!res){ render(); status(); return; }
  if(res.captured) capB.push({color:'w',type:res.captured});
  lastMove={from:res.from,to:res.to}; render(); status();
}
function fbMove(){
  const ms=game.moves({verbose:true}); if(!ms.length){ busy=false; return; }
  ms.sort((a,b)=>(b.captured?VAL[b.captured]:0)-(a.captured?VAL[a.captured]:0));
  const top=ms[0].captured?VAL[ms[0].captured]:0, pool=ms.filter(m=>(m.captured?VAL[m.captured]:0)===top);
  const m=pool[Math.floor(Math.random()*pool.length)]; engMove(m.from+m.to+(m.promotion||''));
}

/* Buttons */
document.getElementById('newgame').onclick=()=>{ game.reset(); selected=null; legalForSel=[]; lastMove=null; busy=false; capW.length=0; capB.length=0; render(); status(); };
document.getElementById('undo').onclick=()=>{ if(busy) return; game.undo(); game.undo(); recompute(); selected=null; legalForSel=[];
  const h=game.history({verbose:true}); lastMove=h.length?{from:h[h.length-1].from,to:h[h.length-1].to}:null; render(); status(); };
function recompute(){ capW.length=0; capB.length=0; game.history({verbose:true}).forEach(m=>{ if(m.captured) (m.color==='w'?capW:capB).push({color:m.color==='w'?'b':'w',type:m.captured}); }); }
document.getElementById('flip').onclick=()=>{ flipped=!flipped; render(); };

render(); status(); boot();
</script>
</body>
</html>
